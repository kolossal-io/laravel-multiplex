name: Run Tests

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ 8.3, 8.4 ]
        laravel: [ "12.*", "13.*" ]
        morphtype: [ integer, uuid, ulid ]
        db: [ sqlite ]
        include:
          - laravel: 9.*
            php: 8.0
            testbench: 7.*
            morphtype: integer
          - laravel: 10.*
            php: 8.1
            testbench: 8.*
            morphtype: integer
          - laravel: 11.*
            php: 8.3
            testbench: 9.*
            morphtype: integer
          - laravel: 12.*
            testbench: 10.*
          - laravel: 13.*
            testbench: 11.*
            db: sqlite
          - laravel: 13.*
            testbench: 11.*
            db: mysql
          - laravel: 13.*
            testbench: 11.*
            db: pgsql
        exclude:
          - laravel: 13.*
            php: 8.3

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.morphtype }}

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testbench
          MYSQL_USER: laravel
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=5

      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testbench
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U laravel -d testbench"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite,
            pdo_mysql, pdo_pgsql, bcmath, soap, intl, gd, exif, iconv, imagick,
            fileinfo

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "directory=$(composer config cache-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.directory }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{
            hashFiles('composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show

      - if: matrix.db == 'sqlite'
        name: Execute tests
        run: vendor/bin/pest
        env:
          MULTIPLEX_MORPH_TYPE: ${{ matrix.morphtype }}

      - if: matrix.db == 'mysql'
        name: Execute tests (MySQL)
        run: vendor/bin/pest
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testbench
          DB_USERNAME: laravel
          DB_PASSWORD: secret
          MULTIPLEX_MORPH_TYPE: ${{ matrix.morphtype }}
      - if: matrix.db == 'pgsql'
        name: Execute tests (PostgreSQL)
        run: vendor/bin/pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: testbench
          DB_USERNAME: laravel
          DB_PASSWORD: secret
          MULTIPLEX_MORPH_TYPE: ${{ matrix.morphtype }}
